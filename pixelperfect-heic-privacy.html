  const DEFAULT_LANG = "en";
  const STORAGE_KEY = "pp-privacy-lang";

  function supported(code) {
    if (!code) return null;
    code = code.toLowerCase();
    if (I18N[code]) return code;
    const base = code.split("-")[0];      // e.g. "cs-CZ" -> "cs"
    return I18N[base] ? base : null;
  }

  // Resolution order mirrors the app's LanguageResolver:
  //   ?lang= (deep link) -> saved preference -> browser language(s) -> en.
  function resolveLang() {
    const q = supported(new URLSearchParams(location.search).get("lang"));
    if (q) return q;
    let saved = null;
    try { saved = supported(localStorage.getItem(STORAGE_KEY)); } catch (e) {}
    if (saved) return saved;
    const nav = navigator.languages || [navigator.language];
    for (const l of nav) { const m = supported(l); if (m) return m; }
    return DEFAULT_LANG;
  }

  function setText(id, value) { document.getElementById(id).textContent = value; }
  function setHtml(id, value) { document.getElementById(id).innerHTML = value; }

  function render(lang) {
    const t = I18N[lang];
    document.documentElement.lang = lang;
    document.title = t.title;

    setText("langbar-label", t.langLabel);
    setText("title", t.title);
    setText("updated-label", t.updatedLabel);
    setText("updated-value", SHARED.updatedValue);
    setText("applies-label", t.appliesLabel);
    setText("applies-value", t.appliesValue);

    setText("summary-h", t.summaryH);   setHtml("summary-body", t.summaryBody);
    setText("collect-h", t.collectH);   setHtml("collect-body", t.collectBody);
    setText("optional-h", t.optionalH); setHtml("optional-body", t.optionalBody);
    setText("storage-h", t.storageH);   setHtml("storage-body", t.storageBody);
    setText("children-h", t.childrenH); setHtml("children-body", t.childrenBody);
    setText("changes-h", t.changesH);   setHtml("changes-body", t.changesBody);
    setText("contact-h", t.contactH);   setHtml("contact-body", t.contactBody);

    document.getElementById("lang-select").value = lang;
  }

  function buildSwitcher(current) {
    const sel = document.getElementById("lang-select");
    for (const { code, label } of LANGS) {
      const opt = document.createElement("option");
      opt.value = code; opt.textContent = label;
      sel.appendChild(opt);
    }
    sel.value = current;
    sel.addEventListener("change", () => {
      const lang = sel.value;
      try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
      const url = new URL(location.href);
      url.searchParams.set("lang", lang);
      history.replaceState(null, "", url);
      render(lang);
    });
  }

  const initial = resolveLang();
  buildSwitcher(initial);
  render(initial);
  </script>
